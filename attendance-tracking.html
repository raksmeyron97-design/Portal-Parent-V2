<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>តាមដានវត្តមាន - Parent Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;600;700&family=Moul&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Kantumruy Pro', sans-serif; 
            background-color: #121212; 
            color: #ffffff;
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .kh-moul { font-family: 'Moul', cursive; }
        
        .bg-app-dark { background-color: #1c1c1e; transition: background-color 0.3s ease; }
        .bg-card-dark { background-color: #242426; transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease; }
        .bg-date-box { background-color: #1a1a1c; } /* Darker box for date */
        .bg-header-green { background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 100%); }
        
        /* Light Mode Adjustments */
        body.light-mode { background-color: #f9fafb; color: #1f2937; }
        body.light-mode .bg-app-dark { background-color: #f9fafb; }
        body.light-mode .bg-card-dark { background-color: #ffffff; border-color: #e5e7eb; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
        body.light-mode .bg-date-box { background-color: #f3f4f6; border-color: #e5e7eb; }
        body.light-mode .text-gray-400 { color: #6b7280; }
        body.light-mode .text-gray-300 { color: #4b5563; }
        body.light-mode .text-gray-200 { color: #1f2937; }
        body.light-mode .border-gray-800 { border-color: #e5e7eb; }
        body.light-mode .border-gray-700 { border-color: #e5e7eb; }
        
        /* Loader */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #10b981;
            width: 24px;
            height: 24px;
            -webkit-animation: spin 1s linear infinite;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Hide scrollbar */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-app-dark min-h-screen flex flex-col">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="spinner w-10 h-10 mb-4 border-t-emerald-500"></div>
        <p class="text-white text-sm animate-pulse">កំពុងទាញយកទិន្នន័យវត្តមាន...</p>
    </div>

    <!-- Header -->
    <div class="bg-header-green pt-12 pb-6 px-6 rounded-b-[2rem] shadow-md relative z-20 shrink-0">
        <div class="flex justify-between items-center mb-6">
            <button onclick="window.location.href='index.html'" class="p-2 bg-white/10 rounded-full hover:bg-white/20 transition flex items-center justify-center">
                <i data-lucide="arrow-left" class="w-5 h-5 text-white"></i>
            </button>
            <h1 class="text-white font-bold text-lg kh-moul">តាមដានវត្តមាន</h1>
            <div class="w-9 h-9"></div> <!-- Spacer for centering -->
        </div>

        <div class="flex items-center gap-4 bg-white/10 p-3 rounded-2xl border border-white/20 backdrop-blur-sm">
            <div class="w-12 h-12 rounded-full border-2 border-white overflow-hidden bg-gray-300 shrink-0">
                <img id="student-photo" src="https://api.dicebear.com/7.x/notionists/svg?seed=loading" class="w-full h-full object-cover">
            </div>
            <div>
                <h3 id="student-name" class="text-white font-bold text-base kh-moul">កំពុងទាញយក...</h3>
                <p class="text-emerald-100/80 text-xs font-mono mt-0.5">ID: <span id="student-id">***</span></p>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 px-4 pt-6 pb-10 overflow-y-auto">
        
        <!-- Today's Status Banner -->
        <div id="today-status-container" class="mb-6">
            <h3 class="text-gray-400 text-sm font-semibold mb-3 px-1">ស្ថានភាពថ្ងៃនេះ (<span id="today-date-text">...</span>)</h3>
            <div id="today-status-card" class="bg-card-dark rounded-2xl p-4 border border-gray-700 shadow-sm flex items-center gap-4">
                <div class="spinner w-6 h-6 border-t-emerald-500 mx-auto"></div> <!-- Initial Loading -->
            </div>
        </div>

        <!-- Summary Cards -->
        <h3 class="text-gray-400 text-sm font-semibold mb-3 px-1">សង្ខេបប្រចាំខែ</h3>
        <div class="grid grid-cols-3 gap-3 mb-6">
            <div class="bg-card-dark p-3 rounded-2xl border border-gray-700/50 shadow-sm flex flex-col items-center justify-center text-center">
                <div class="w-8 h-8 rounded-full bg-emerald-500/10 flex items-center justify-center mb-1 border border-emerald-500/20">
                    <i data-lucide="check" class="w-4 h-4 text-emerald-500"></i>
                </div>
                <p class="text-[10px] text-gray-400 mb-0.5 font-bold">មក</p>
                <p id="total-p" class="text-lg font-bold text-emerald-500 kh-moul">០</p>
            </div>
            
            <div class="bg-card-dark p-3 rounded-2xl border border-gray-700/50 shadow-sm flex flex-col items-center justify-center text-center">
                <div class="w-8 h-8 rounded-full bg-yellow-500/10 flex items-center justify-center mb-1 border border-yellow-500/20">
                    <i data-lucide="file-text" class="w-4 h-4 text-yellow-500"></i>
                </div>
                <p class="text-[10px] text-gray-400 mb-0.5 font-bold">ច្បាប់</p>
                <p id="total-l" class="text-lg font-bold text-yellow-500 kh-moul">០</p>
            </div>

            <div class="bg-card-dark p-3 rounded-2xl border border-gray-700/50 shadow-sm flex flex-col items-center justify-center text-center">
                <div class="w-8 h-8 rounded-full bg-red-500/10 flex items-center justify-center mb-1 border border-red-500/20">
                    <i data-lucide="x" class="w-4 h-4 text-red-500"></i>
                </div>
                <p class="text-[10px] text-gray-400 mb-0.5 font-bold">អវត្តមាន</p>
                <p id="total-a" class="text-lg font-bold text-red-500 kh-moul">០</p>
            </div>
        </div>

        <!-- Filter & List Header -->
        <div class="flex justify-between items-center mb-4 px-1">
            <h3 class="text-gray-400 text-sm font-semibold">កំណត់ត្រាប្រចាំថ្ងៃ</h3>
            <div class="relative">
                <input type="month" id="month-filter" class="bg-card-dark border border-gray-700/50 text-white text-xs rounded-lg px-2 py-1.5 outline-none focus:border-emerald-500 transition shadow-sm appearance-none font-sans">
            </div>
        </div>

        <!-- History List (Table View for Mobile) -->
        <div id="history-list">
            <!-- Items injected by JS -->
        </div>

    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBU50HJrekgHWwwyLq5CTRwhjHkGJAAAfs",
            authDomain: "classroom-management-82382.firebaseapp.com",
            projectId: "classroom-management-82382",
            storageBucket: "classroom-management-82382.firebasestorage.app",
            messagingSenderId: "146641865620",
            appId: "1:146641865620:web:ce693b7b064afd5d1bdd81"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const PTEC_APP_ID = "ptec-app";

        // State Variables - Wrapped safely for mobile privacy browsers
        let savedTid = null;
        let savedSid = null;
        try {
            savedTid = localStorage.getItem('savedTid');
            savedSid = localStorage.getItem('savedSid');
        } catch (e) {
            console.warn("Storage access denied on this mobile browser.");
        }
        
        let allRecords = []; 
        const khMonths = ["មករា", "កុម្ភៈ", "មីនា", "មេសា", "ឧសភា", "មិថុនា", "កក្កដា", "សីហា", "កញ្ញា", "តុលា", "វិច្ឆិកា", "ធ្នូ"];
        const khDigits = ['០', '១', '២', '៣', '៤', '៥', '៦', '៧', '៨', '៩'];
        
        function toKhmerNum(num) { 
            return num.toString().split('').map(d => khDigits[d] || d).join(''); 
        }

        // Safe Icon Loader (prevents crash if CDN is slow on mobile data)
        function safeCreateIcons() {
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
        }

        safeCreateIcons();

        // Mobile Fix: Hide loader before redirecting if unauthorized
        if (!savedTid || !savedSid) {
            document.getElementById('loading-overlay').classList.add('hidden');
            alert("សូមធ្វើការឡុកចូលជាមុនសិន!");
            window.location.href = 'index.html';
        } else {
            // Init Auth & Fetch Data
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    await fetchData();
                } else {
                    // Mobile Fix: Catch network auth errors and hide loader
                    signInAnonymously(auth).catch(err => {
                        console.error("Auth error:", err);
                        document.getElementById('loading-overlay').classList.add('hidden');
                        alert("មានបញ្ហាក្នុងការភ្ជាប់ប្រព័ន្ធ។ សូមពិនិត្យអ៊ីនធឺណិតរបស់អ្នក។");
                    });
                }
            });
        }

        // Setup Dates
        const todayObj = new Date();
        const yyyy = todayObj.getFullYear();
        const mm = String(todayObj.getMonth() + 1).padStart(2, '0');
        const dd = String(todayObj.getDate()).padStart(2, '0');
        const todayStr = `${yyyy}-${mm}-${dd}`; 
        
        document.getElementById('today-date-text').textContent = `${toKhmerNum(todayObj.getDate())} ${khMonths[todayObj.getMonth()]}`;

        const currentMonthString = `${yyyy}-${mm}`;
        document.getElementById('month-filter').value = currentMonthString;

        document.getElementById('month-filter').addEventListener('change', () => {
            renderList();
        });

        async function fetchData() {
            try {
                const studentRef = doc(db, 'artifacts', PTEC_APP_ID, 'users', savedTid, 'students', savedSid);
                const studentSnap = await getDoc(studentRef);
                
                if (studentSnap.exists()) {
                    const sData = studentSnap.data();
                    document.getElementById('student-name').textContent = sData.name || 'គ្មានឈ្មោះ';
                    document.getElementById('student-id').textContent = savedSid;
                    if (sData.photo) {
                        document.getElementById('student-photo').src = sData.photo;
                    }
                }

                const classDocRef = doc(db, "users", savedTid, "data", "class_default");
                const classDocSnap = await getDoc(classDocRef);
                
                allRecords = []; 

                if (classDocSnap.exists()) {
                    const data = classDocSnap.data();
                    const history = data.attendanceHistory || {};
                    
                    for (const date in history) {
                        if (history[date][savedSid]) {
                            allRecords.push({
                                date: date,
                                status: history[date][savedSid].status,
                                note: history[date][savedSid].note || ''
                            });
                        }
                    }

                    // Mobile Fix: Use localeCompare instead of new Date() to avoid Safari NaN crash
                    allRecords.sort((a, b) => b.date.localeCompare(a.date));
                }

                renderTodayStatus();
                renderList();

            } catch (error) {
                console.error("Error fetching attendance:", error);
                document.getElementById('history-list').innerHTML = `
                    <div class="text-center p-6 bg-red-500/10 border border-red-500/30 rounded-2xl">
                        <i data-lucide="alert-circle" class="w-8 h-8 text-red-500 mx-auto mb-2"></i>
                        <p class="text-red-400 text-sm">មានបញ្ហាក្នុងការទាញយកទិន្នន័យ។ សូមសាកល្បងម្ដងទៀត។</p>
                    </div>
                `;
                safeCreateIcons();
            } finally {
                const loader = document.getElementById('loading-overlay');
                loader.classList.add('opacity-0');
                setTimeout(() => loader.classList.add('hidden'), 300);
            }
        }

        // Mobile Tailwind Fix: Provide the full border-l class string so Tailwind CDN can compile it
        function getStatusConfig(status) {
            if (status === 'P') return { icon: 'check', colorClass: 'text-emerald-500', borderColor: 'border-emerald-500/30 bg-emerald-500/10', leftBorder: 'border-l-emerald-500', label: 'មានវត្តមាន' };
            if (status === 'L') return { icon: 'file-text', colorClass: 'text-yellow-500', borderColor: 'border-yellow-500/30 bg-yellow-500/10', leftBorder: 'border-l-yellow-500', label: 'សុំច្បាប់' };
            if (status === 'A') return { icon: 'x', colorClass: 'text-red-500', borderColor: 'border-red-500/30 bg-red-500/10', leftBorder: 'border-l-red-500', label: 'អវត្តមាន' };
            return { icon: 'help-circle', colorClass: 'text-gray-500', borderColor: 'border-gray-500/30 bg-gray-500/10', leftBorder: 'border-l-gray-500', label: 'មិនស្គាល់' };
        }

        function renderTodayStatus() {
            const todayCard = document.getElementById('today-status-card');
            const todayRecord = allRecords.find(r => r.date === todayStr);

            if (todayRecord) {
                const config = getStatusConfig(todayRecord.status);
                // Updated with safe leftBorder class
                todayCard.className = `bg-card-dark rounded-2xl p-4 border border-gray-700 shadow-sm flex items-center justify-between gap-4 border-l-4 ${config.leftBorder}`;
                
                todayCard.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center ${config.borderColor} shrink-0">
                            <i data-lucide="${config.icon}" class="w-5 h-5 ${config.colorClass}"></i>
                        </div>
                        <div>
                            <p class="font-bold text-base text-gray-200">${config.label}</p>
                            ${todayRecord.note ? `<p class="text-[11px] text-gray-500 mt-0.5 italic flex items-start gap-1"><i data-lucide="message-square" class="w-3 h-3 shrink-0"></i> ${todayRecord.note}</p>` : '<p class="text-[11px] text-gray-500 mt-0.5">បានកត់ត្រារួចរាល់</p>'}
                        </div>
                    </div>
                `;
            } else {
                todayCard.innerHTML = `
                    <div class="flex items-center gap-3 w-full">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center bg-gray-500/10 border border-gray-500/20 shrink-0">
                            <i data-lucide="clock" class="w-5 h-5 text-gray-400"></i>
                        </div>
                        <div>
                            <p class="font-bold text-sm text-gray-300">មិនទាន់មានទិន្នន័យ</p>
                            <p class="text-[11px] text-gray-500 mt-0.5">លោកគ្រូ/អ្នកគ្រូមិនទាន់កត់ត្រាវត្តមានថ្ងៃនេះនៅឡើយទេ</p>
                        </div>
                    </div>
                `;
            }
            safeCreateIcons();
        }

        function renderList() {
            const listContainer = document.getElementById('history-list');
            const selectedMonth = document.getElementById('month-filter').value; 
            
            const filteredRecords = allRecords.filter(record => record.date.startsWith(selectedMonth));
            
            let countP = 0, countL = 0, countA = 0;
            let html = '';

            if (filteredRecords.length === 0) {
                html = `
                    <div class="text-center p-8 bg-card-dark border border-gray-800 rounded-2xl flex flex-col items-center">
                        <div class="bg-gray-800/50 p-3 rounded-full mb-3">
                            <i data-lucide="calendar-x" class="w-6 h-6 text-gray-500"></i>
                        </div>
                        <p class="text-gray-400 text-sm font-bold">មិនមានកំណត់ត្រាវត្តមានទេ</p>
                        <p class="text-gray-500 text-xs mt-1">សម្រាប់ខែដែលអ្នកបានជ្រើសរើស</p>
                    </div>
                `;
            } else {
                let tableRows = '';

                filteredRecords.forEach(record => {
                    if (record.status === 'P') countP++;
                    else if (record.status === 'L') countL++;
                    else if (record.status === 'A') countA++;

                    // Note: Since we need accurate dates for the Khmer display, we append 'T00:00:00' to ensure timezone consistency across mobile devices
                    const d = new Date(record.date + 'T00:00:00');
                    const dayKh = toKhmerNum(d.getDate() || 1); 
                    const monthKh = khMonths[d.getMonth() || 0];
                    
                    const config = getStatusConfig(record.status);

                    tableRows += `
                        <tr class="active:bg-black/10 transition-colors">
                            <td class="py-3 px-4 whitespace-nowrap align-top w-[90px]">
                                <div class="flex flex-col">
                                    <span class="text-[15px] font-bold text-gray-200 kh-moul leading-tight">${dayKh}</span>
                                    <span class="text-[10px] text-gray-500 font-semibold mt-0.5">${monthKh}</span>
                                </div>
                            </td>
                            <td class="py-3 px-4 align-top">
                                <div class="flex flex-col items-start gap-1">
                                    <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-[11px] font-bold ${config.borderColor} ${config.colorClass} border">
                                        <i data-lucide="${config.icon}" class="w-3.5 h-3.5"></i> ${config.label}
                                    </span>
                                    ${record.note ? `<p class="text-[11px] text-gray-500 italic flex items-start gap-1 mt-1 leading-snug"><i data-lucide="message-square" class="w-3 h-3 shrink-0 mt-px"></i> ${record.note}</p>` : ''}
                                </div>
                            </td>
                        </tr>
                    `;
                });

                html = `
                    <div class="bg-card-dark rounded-2xl border border-gray-700/60 overflow-hidden shadow-sm">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-date-box border-b border-gray-700/60">
                                    <th class="py-2.5 px-4 text-[11px] font-bold text-gray-400 uppercase tracking-wider">ថ្ងៃខែ</th>
                                    <th class="py-2.5 px-4 text-[11px] font-bold text-gray-400 uppercase tracking-wider">ស្ថានភាព & ចំណាំ</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-700/50">
                                ${tableRows}
                            </tbody>
                        </table>
                    </div>
                `;
            }

            listContainer.innerHTML = html;
            
            document.getElementById('total-p').textContent = toKhmerNum(countP);
            document.getElementById('total-l').textContent = toKhmerNum(countL);
            document.getElementById('total-a').textContent = toKhmerNum(countA);

            safeCreateIcons();
        }
    </script>
</body>
</html>
